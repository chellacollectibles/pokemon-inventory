<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chella Collectibles Inventory</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="hero">
    <div class="hero-bg-glow hero-glow-one"></div>
    <div class="hero-bg-glow hero-glow-two"></div>

    <div class="hero-inner">
      <div class="eyebrow">Chella Collectibles</div>

      <h1>Available Pokémon Inventory</h1>

      <p class="hero-subtitle">
        Browse our current available cards and collectibles.
      </p>

      <div class="credit-card">
        <div>
          <span class="credit-kicker">Trade in your cards</span>
          <strong>Get store credit usable toward items shown here.</strong>
        </div>

        <a class="trade-button" href="https://form.jotform.com/261127952360051" target="_blank" rel="noopener">
          Start Trade-In
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="gallery-wrap">
      <div class="gallery-top">
        <h2>Current Inventory</h2>
        <p id="imageCount">Loading images...</p>
      </div>

      <section id="gallery" class="gallery"></section>

      <div class="load-more-wrap">
        <button id="loadMoreBtn" class="load-more-btn">Load More</button>
      </div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="closeLightbox" class="close-btn" aria-label="Close image">×</button>
    <img id="lightboxImage" src="" alt="Expanded inventory item" />
  </div>

  <script src="script.js"></script>
</body>
</html>
